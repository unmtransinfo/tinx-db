# TIN-X database — docker compose
#
# Prerequisites:
#   1. cp .env.example .env  && fill in CPUS, MEMORY, HOST_PORT, credentials
#   2. ./tune.sh             # generates mysql-tuning.cnf from your CPUS/MEMORY
#   3. docker compose up -d  # builds image and starts the container
#
# To rebuild the image after a Dockerfile change:
#   docker compose up -d --build

name: tinx-db

services:
  db:
    build: .
    # Load MYSQL_ROOT_PASSWORD, MYSQL_DATABASE, DB_USER, DB_PASSWORD, DUMP_URL
    env_file: .env
    ports:
      - "127.0.0.1:${HOST_PORT}:3306"
    volumes:
      - tinx-mysql-data:/var/lib/mysql
      - ./mysql-tuning.cnf:/etc/mysql/conf.d/tuning.cnf:ro
    deploy:
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY}"
    restart: unless-stopped

volumes:
  tinx-mysql-data:

